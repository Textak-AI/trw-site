function ArticleFields({block, onChange}){
  const d = block.data;
  const set = (key,val) => onChange({...block, data:{...d, [key]:val}});
  const t = block.type;
  if(t==="art_header") return <><Input label="Category" value={d.category} onChange={v=>set("category",v)} small/><Input label="Reading Time" value={d.readTime} onChange={v=>set("readTime",v)} small/><Input label="Sources" value={d.sources} onChange={v=>set("sources",v)} small/></>;
  if(t==="art_body") return <><Input label="Heading (H2)" value={d.heading} onChange={v=>set("heading",v)}/><Input label="Body" value={d.body} onChange={v=>set("body",v)} multi/></>;
  if(t==="art_callout") return <Input label="Callout Text" value={d.text} onChange={v=>set("text",v)} multi/>;
  if(t==="art_assessment") return <><Input label="Assessment Name" value={d.name} onChange={v=>set("name",v)}/>{(d.questions||[]).map((q,i)=><Input key={i} label={"Q"+(i+1)} value={q} onChange={v=>{const qs=[...d.questions];qs[i]=v;set("questions",qs);}} small/>)}<button onClick={()=>set("questions",[...(d.questions||[]),"New question"])} style={{background:"none",border:"1px dashed #E0E0E0",borderRadius:4,padding:"4px 10px",fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:10,color:"#999",cursor:"pointer",width:"100%"}}>+ Add Question</button></>;
  if(t==="art_sources") return <>{(d.sources||[]).map((s,i)=><Input key={i} label={"Source "+(i+1)} value={s} onChange={v=>{const ss=[...d.sources];ss[i]=v;set("sources",ss);}} small/>)}<button onClick={()=>set("sources",[...(d.sources||[]),"New source"])} style={{background:"none",border:"1px dashed #E0E0E0",borderRadius:4,padding:"4px 10px",fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:10,color:"#999",cursor:"pointer",width:"100%"}}>+ Add Source</button></>;
  if(t==="art_bio") return <><Input label="Author" value={d.author} onChange={v=>set("author",v)} small/><Input label="Bio" value={d.bio} onChange={v=>set("bio",v)} multi/></>;
  return <Input label="Content" value={d.text||""} onChange={v=>set("text",v)} multi/>;
}

function ArticlePreviewBlock({block}){
  const d = block.data; const t = block.type;
  if(t==="art_header") return <div style={{padding:"16px 24px",borderBottom:"1px solid #E0E0E0"}}><p style={{fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:10,color:"#666",margin:0}}>{d.category} | {d.readTime} | Sources: {d.sources}</p></div>;
  if(t==="art_body") return <div style={{padding:"14px 24px"}}>{d.heading && <h2 style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:700,color:"#2C2C2C",margin:"0 0 8px",borderBottom:"2px solid #C4622D",paddingBottom:8,display:"inline-block"}}>{d.heading}</h2>}<p style={{fontFamily:"Georgia,serif",fontSize:13,color:"#666",lineHeight:1.8,margin:d.heading?"8px 0 0":0}}>{d.body}</p></div>;
  if(t==="art_callout") return <div style={{margin:"10px 24px",background:"#FAF7F4",borderLeft:"4px solid #C4622D",padding:"16px 20px"}}><p style={{fontFamily:"Georgia,serif",fontSize:14,color:"#2C2C2C",lineHeight:1.6,margin:0,fontWeight:700}}>{d.text}</p></div>;
  if(t==="art_assessment") return <div style={{margin:"10px 24px",background:"#FAF7F4",border:"2px solid #C4622D",borderRadius:8,padding:16}}><h3 style={{fontFamily:"Georgia,serif",fontSize:16,color:"#C4622D",margin:"0 0 10px"}}>{d.name}</h3>{(d.questions||[]).map((q,i)=><div key={i} style={{display:"flex",gap:6,padding:"6px 0",borderBottom:"1px solid #E0E0E0",fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:11,color:"#666"}}><input type="checkbox" disabled/>{q}</div>)}<button disabled style={{marginTop:12,padding:"8px 20px",background:"#C4622D",color:"#fff",border:"none",borderRadius:4,fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:12,fontWeight:600}}>Calculate My Score</button></div>;
  if(t==="art_sources") return <div style={{padding:"14px 24px",borderTop:"1px solid #E0E0E0"}}><h3 style={{fontFamily:"Georgia,serif",fontSize:14,fontWeight:700,margin:"0 0 6px"}}>Sources</h3>{(d.sources||[]).map((s,i)=><p key={i} style={{fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:10,color:"#999",margin:"2px 0"}}>{i+1}. {s}</p>)}</div>;
  if(t==="art_bio") return <div style={{padding:"14px 24px",borderTop:"1px solid #E0E0E0",display:"flex",gap:12,alignItems:"center"}}><div style={{width:40,height:40,borderRadius:20,background:"#FAF7F4",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",fontSize:16,color:"#C4622D",fontWeight:700,flexShrink:0}}>{(d.author||"C")[0]}</div><div><h4 style={{fontFamily:"Georgia,serif",fontSize:13,margin:0}}>By {d.author}</h4><p style={{fontFamily:"'Segoe UI',Arial,sans-serif",fontSize:10,color:"#666",margin:0}}>{d.bio}</p></div></div>;
  return <div style={{padding:16,fontSize:11,color:"#999"}}>[{block.type}]</div>;
}

// ═══ UI COMPONENTS ═══
const Ico = ({children,color})=><span style={{fontSize:14,color:color||C.rust,marginRight:6}}>{children}</span>;
const Label = ({children})=><div style={{fontFamily:F.b,fontSize:10,fontWeight:700,color:C.grayLt,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>{children}</div>;
const Input = ({label,value,onChange,multi,small})=>{
  const s = {width:"100%",padding:small?"4px 8px":"8px 10px",border:`1px solid ${C.rule}`,borderRadius:4,fontFamily:F.b,fontSize:small?11:12,color:C.black,background:C.white,resize:"vertical",outline:"none"};
  return <div style={{marginBottom:8}}>
    {label && <label style={{fontFamily:F.b,fontSize:10,color:C.gray,display:"block",marginBottom:3}}>{label}</label>}
    {multi ? <textarea rows={3} style={s} value={value||""} onChange={e=>onChange(e.target.value)}/> : <input style={s} value={value||""} onChange={e=>onChange(e.target.value)}/>}
  </div>;
};

// ═══ MAIN APP ═══
function TRWSiteEditor(){
  const [pages, setPages] = useState(PAGES);
  const [activePage, setActivePage] = useState("home");
  const [activeSection, setActiveSection] = useState(null);
  const [view, setView] = useState("pages"); // pages | articles
  const [showPalette, setShowPalette] = useState(false);
  const [paletteInsertIdx, setPaletteInsertIdx] = useState(-1);
  const [saved, setSaved] = useState(false);
  const [articles, setArticles] = useState(ARTICLES_DATA);
  const [activeArticle, setActiveArticle] = useState(null);
  const [activeBlock, setActiveBlock] = useState(null);
  const [showArtPalette, setShowArtPalette] = useState(false);
  const [artPaletteIdx, setArtPaletteIdx] = useState(-1);
  const previewRef = useRef(null);

  const page = pages.find(p=>p.id===activePage);
  const article = articles.find(a=>a.id===activeArticle);

  const updateBlock = useCallback((blockId, updated) => {
    setArticles(prev => prev.map(a => a.id===activeArticle ? {...a, blocks: a.blocks.map(b => b.id===blockId ? updated : b)} : a));
  }, [activeArticle]);

  const moveBlock = (idx, dir) => {
    setArticles(prev => prev.map(a => {
      if(a.id!==activeArticle) return a;
      const b = [...a.blocks]; const ni = idx+dir;
      if(ni<0||ni>=b.length) return a;
      [b[idx],b[ni]]=[b[ni],b[idx]];
      return {...a, blocks:b};
    }));
  };

  const deleteBlock = (idx) => {
    setArticles(prev => prev.map(a => a.id===activeArticle ? {...a, blocks: a.blocks.filter((_,i)=>i!==idx)} : a));
    setActiveBlock(null);
  };

  const addBlock = (type) => {
    const meta = ART_BLOCK_TYPES[type];
    const nb = {id:"ab_"+Date.now(),type,label:meta.label,data:type==="art_body"?{heading:"New Section",body:""}:type==="art_assessment"?{name:"Assessment",questions:["Question 1"],endpoint:"xnjbobyn"}:type==="art_sources"?{sources:["Source 1"]}:type==="art_bio"?{author:"Charlie",bio:"The Rail Way editorial team."}:type==="art_callout"?{text:"Key statistic."}:{category:"",readTime:"",sources:""}};
    setArticles(prev => prev.map(a => {
      if(a.id!==activeArticle) return a;
      const b=[...a.blocks]; b.splice(artPaletteIdx+1,0,nb); return {...a,blocks:b};
    }));
    setShowArtPalette(false); setActiveBlock(nb.id);
  };

  const updateSection = useCallback((sectionId, updated) => {
    setPages(prev => prev.map(p => p.id===activePage ? {...p, sections: p.sections.map(s => s.id===sectionId ? updated : s)} : p));
  }, [activePage]);

  const moveSection = (idx, dir) => {
    setPages(prev => prev.map(p => {
      if(p.id!==activePage) return p;
      const s = [...p.sections];
      const newIdx = idx + dir;
      if(newIdx < 0 || newIdx >= s.length) return p;
      [s[idx], s[newIdx]] = [s[newIdx], s[idx]];
      return {...p, sections: s};
    }));
  };

  const deleteSection = (idx) => {
    setPages(prev => prev.map(p => p.id===activePage ? {...p, sections: p.sections.filter((_,i)=>i!==idx)} : p));
    setActiveSection(null);
  };

  const addSection = (type) => {
    const meta = SECTION_TYPES[type];
    const newSec = {id:"new_"+Date.now(),type,label:meta.label,data:{heading:"New "+meta.label}};
    setPages(prev => prev.map(p => {
      if(p.id!==activePage) return p;
      const s = [...p.sections];
      s.splice(paletteInsertIdx+1, 0, newSec);
      return {...p, sections: s};
    }));
    setShowPalette(false);
    setActiveSection(newSec.id);
  };

  const handleSave = () => { setSaved(true); setTimeout(()=>setSaved(false), 2000); };

  return <div style={{display:"flex",height:"100vh",background:"#f0f0f0",fontFamily:F.b,overflow:"hidden"}}>

    {/* ═══ LEFT SIDEBAR ═══ */}
    <div style={{width:220,background:C.deep,color:C.white,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"16px 16px 12px",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
        <img src={I.logo} alt="TRW" style={{height:28,filter:"brightness(10)",marginBottom:8}}/>
        <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:"1px",textTransform:"uppercase"}}>Site Editor</div>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
        <button onClick={()=>setView("pages")} style={{flex:1,padding:"10px",background:view==="pages"?"rgba(196,98,45,0.2)":"transparent",border:"none",color:view==="pages"?C.rust:"rgba(255,255,255,0.5)",fontFamily:F.b,fontSize:11,fontWeight:600,cursor:"pointer",borderBottom:view==="pages"?`2px solid ${C.rust}`:"2px solid transparent"}}>Pages</button>
        <button onClick={()=>setView("articles")} style={{flex:1,padding:"10px",background:view==="articles"?"rgba(196,98,45,0.2)":"transparent",border:"none",color:view==="articles"?C.rust:"rgba(255,255,255,0.5)",fontFamily:F.b,fontSize:11,fontWeight:600,cursor:"pointer",borderBottom:view==="articles"?`2px solid ${C.rust}`:"2px solid transparent"}}>Articles</button>
      </div>

      <div style={{flex:1,overflow:"auto",padding:"8px 0"}}>
        {view==="pages" ? pages.map(p=>
          <button key={p.id} onClick={()=>{setActivePage(p.id);setActiveSection(null);setActiveArticle(null);}} style={{width:"100%",padding:"10px 16px",background:activePage===p.id?"rgba(196,98,45,0.15)":"transparent",border:"none",color:activePage===p.id?C.rust:"rgba(255,255,255,0.7)",fontFamily:F.b,fontSize:12,fontWeight:activePage===p.id?600:400,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span><Ico>{p.icon}</Ico>{p.title}</span>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{p.sections.length}</span>
          </button>
        ) : <>
          <button onClick={()=>{const id="new_"+Date.now();setArticles(prev=>[...prev,{id,title:"New Article",path:"/insights/new",type:"New",date:"2026",blocks:[{id:id+"_h",type:"art_header",label:"Header",data:{category:"",readTime:"8 min read",sources:""}},{id:id+"_b1",type:"art_body",label:"Introduction",data:{heading:"",body:""}},{id:id+"_a1",type:"art_assessment",label:"Assessment",data:{name:"Assessment",questions:["Question 1"],endpoint:"xnjbobyn"}},{id:id+"_s1",type:"art_sources",label:"Sources",data:{sources:["Source 1"]}},{id:id+"_bio",type:"art_bio",label:"Author Bio",data:{author:"Charlie",bio:"The Rail Way editorial team."}}]}]);setActiveArticle(id);setActiveBlock(null);}} style={{width:"100%",padding:"10px 16px",background:"rgba(196,98,45,0.1)",border:"none",borderBottom:"1px solid rgba(255,255,255,0.05)",color:C.rust,fontFamily:F.b,fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"left"}}>+ New Article</button>
          {articles.map(a=>
          <button key={a.id} onClick={()=>{setActiveArticle(a.id);setActiveBlock(null);}} style={{width:"100%",padding:"10px 16px",background:activeArticle===a.id?"rgba(196,98,45,0.15)":"transparent",border:"none",color:activeArticle===a.id?C.rust:"rgba(255,255,255,0.7)",fontFamily:F.b,fontSize:12,fontWeight:activeArticle===a.id?600:400,cursor:"pointer",textAlign:"left"}}>
            <div>{a.title}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{a.type} · {a.date}</div>
          </button>
        )}</>}
      </div>

      <div style={{padding:12,borderTop:"1px solid rgba(255,255,255,0.1)"}}>
        <button onClick={handleSave} style={{width:"100%",padding:"10px",background:saved?"#27AE60":C.rust,border:"none",borderRadius:6,color:C.white,fontFamily:F.b,fontSize:12,fontWeight:600,cursor:"pointer"}}>
          {saved ? "✓ Saved" : "Save Changes"}
        </button>
        <a href="https://therailway.us" target="_blank" rel="noopener" style={{display:"block",textAlign:"center",marginTop:8,fontFamily:F.b,fontSize:10,color:"rgba(255,255,255,0.4)",textDecoration:"none"}}>View Live Site →</a>
      </div>
    </div>

    {/* ═══ EDITOR PANEL ═══ */}
    <div style={{width:320,background:C.white,borderRight:`1px solid ${C.rule}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.rule}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <h2 style={{fontFamily:F.h,fontSize:16,margin:0,color:C.black}}>{activeArticle ? (article?.title||"Article") : page?.title}</h2>
          <p style={{fontFamily:F.b,fontSize:10,color:C.grayLt,margin:0}}>{activeArticle ? (article?.type+" · "+article?.blocks.length+" blocks") : (page?.path+" · "+page?.sections.length+" sections")}</p>
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:0}}>
        {page?.sections.map((sec,idx)=><div key={sec.id}>
          {/* Section header */}
          <div onClick={()=>setActiveSection(activeSection===sec.id?null:sec.id)} style={{padding:"10px 16px",background:activeSection===sec.id?C.cream:C.white,borderBottom:`1px solid ${C.rule}`,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:20,height:20,borderRadius:4,background:(SECTION_TYPES[sec.type]?.color||C.rust)+"18",color:SECTION_TYPES[sec.type]?.color||C.rust,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>{SECTION_TYPES[sec.type]?.icon||"·"}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:F.b,fontSize:12,fontWeight:600,color:C.black}}>{sec.label}</div>
              <div style={{fontFamily:F.b,fontSize:9,color:C.grayLt}}>{SECTION_TYPES[sec.type]?.label}</div>
            </div>
            <div style={{display:"flex",gap:2}}>
              <button onClick={e=>{e.stopPropagation();moveSection(idx,-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.grayLt,padding:2}} title="Move up">▲</button>
              <button onClick={e=>{e.stopPropagation();moveSection(idx,1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.grayLt,padding:2}} title="Move down">▼</button>
              <button onClick={e=>{e.stopPropagation();deleteSection(idx);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#e74c3c",padding:2}} title="Delete">✕</button>
            </div>
          </div>
          {/* Section fields */}
          {activeSection===sec.id && <div style={{padding:"12px 16px",background:C.cream,borderBottom:`1px solid ${C.rule}`}}>
            <SectionFields section={sec} onChange={updated=>updateSection(sec.id,updated)}/>
          </div>}
          {/* Add section button between sections */}
          <div style={{textAlign:"center",padding:"2px 0"}}>
            <button onClick={()=>{setPaletteInsertIdx(idx);setShowPalette(true);}} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F.b,fontSize:9,color:C.grayLt,padding:"2px 8px"}} title="Add section here">+ add section</button>
          </div>
        </div>)}
        {activeArticle && article && article.blocks.map((blk,idx)=><div key={blk.id}>
          <div onClick={()=>setActiveBlock(activeBlock===blk.id?null:blk.id)} style={{padding:"10px 16px",background:activeBlock===blk.id?C.cream:C.white,borderBottom:`1px solid ${C.rule}`,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:20,height:20,borderRadius:4,background:(ART_BLOCK_TYPES[blk.type]?.color||C.rust)+"18",color:ART_BLOCK_TYPES[blk.type]?.color||C.rust,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{ART_BLOCK_TYPES[blk.type]?.icon||"?"}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:F.b,fontSize:12,fontWeight:600,color:C.black}}>{blk.label}</div>
              <div style={{fontFamily:F.b,fontSize:9,color:C.grayLt}}>{ART_BLOCK_TYPES[blk.type]?.label}</div>
            </div>
            <div style={{display:"flex",gap:2}}>
              <button onClick={e=>{e.stopPropagation();moveBlock(idx,-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.grayLt,padding:2}}>&#9650;</button>
              <button onClick={e=>{e.stopPropagation();moveBlock(idx,1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.grayLt,padding:2}}>&#9660;</button>
              <button onClick={e=>{e.stopPropagation();deleteBlock(idx);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#e74c3c",padding:2}}>&#10005;</button>
            </div>
          </div>
          {activeBlock===blk.id && <div style={{padding:"12px 16px",background:C.cream,borderBottom:`1px solid ${C.rule}`}}>
            <ArticleFields block={blk} onChange={updated=>updateBlock(blk.id,updated)}/>
          </div>}
          <div style={{textAlign:"center",padding:"2px 0"}}>
            <button onClick={()=>{setArtPaletteIdx(idx);setShowArtPalette(true);}} style={{background:"none",border:"none",cursor:"pointer",fontFamily:F.b,fontSize:9,color:C.grayLt,padding:"2px 8px"}}>+ add block</button>
          </div>
        </div>)}
      </div>
    </div>

    {/* ═══ PREVIEW PANEL ═══ */}
    <div style={{flex:1,overflow:"auto",background:"#e8e8e8",display:"flex",justifyContent:"center"}} ref={previewRef}>
      <div style={{width:"100%",maxWidth:700,background:C.white,minHeight:"100%",boxShadow:"0 0 40px rgba(0,0,0,0.1)"}}>
        {/* Mini header */}
        <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"8px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <img src={I.logo} alt="TRW" style={{height:28}}/>
          <div style={{display:"flex",gap:12}}>
            {["Home","Speak Up Culture","Our Process","Class II & III","Insights","About","Legacies","Contact"].map(n=>
              <span key={n} style={{fontFamily:F.b,fontSize:9,color:page?.title===n?C.rust:C.grayLt,fontWeight:600}}>{n}</span>
            )}
          </div>
        </div>
        {/* Sections */}
        {activeArticle && article ? <>
          <div style={{padding:"20px 24px",borderBottom:`2px solid ${C.rust}`}}>
            <h1 style={{fontFamily:F.h,fontSize:26,fontWeight:700,color:C.black,margin:"0 0 4px"}}>{article.title}</h1>
            <p style={{fontFamily:F.b,fontSize:11,color:C.grayLt,margin:0}}>By Charlie | The Rail Way</p>
          </div>
          {article.blocks.map(blk=>
            <div key={blk.id} onClick={()=>setActiveBlock(blk.id)} style={{cursor:"pointer",outline:activeBlock===blk.id?`2px solid ${C.rust}`:"2px solid transparent",outlineOffset:-2,transition:"outline 0.15s"}}>
              <ArticlePreviewBlock block={blk}/>
            </div>
          )}
        </> : page?.sections.map(sec=>
          <div key={sec.id} onClick={()=>setActiveSection(sec.id)} style={{cursor:"pointer",outline:activeSection===sec.id?`2px solid ${C.rust}`:"2px solid transparent",outlineOffset:-2,transition:"outline 0.15s"}}>
            <PreviewSection section={sec}/>
          </div>
        )}
        {/* Mini footer */}
        <div style={{background:C.deep,padding:"20px 24px"}}>
          <img src={I.logoW} alt="" style={{height:20,filter:"brightness(1.2)",marginBottom:8}}/>
          <p style={{fontFamily:F.b,fontSize:9,color:"rgba(255,255,255,0.3)"}}>© 2026 KingdomBuilding Leadership, Inc.</p>
        </div>
      </div>
    </div>

    {/* ═══ ADD SECTION PALETTE ═══ */}
    {showPalette && <AddSectionPalette onAdd={addSection} onClose={()=>setShowPalette(false)}/>}
    {showArtPalette && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowArtPalette(false)}><div style={{background:C.white,borderRadius:12,padding:24,maxWidth:400,width:"90%"}} onClick={e=>e.stopPropagation()}><h3 style={{fontFamily:F.h,fontSize:18,margin:"0 0 16px"}}>Add Article Block</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{Object.entries(ART_BLOCK_TYPES).map(([key,meta])=><button key={key} onClick={()=>addBlock(key)} style={{background:C.white,border:`1px solid ${C.rule}`,borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span style={{width:28,height:28,borderRadius:6,background:meta.color+"18",color:meta.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}>{meta.icon}</span><span style={{fontFamily:F.b,fontSize:12,fontWeight:600,color:C.black}}>{meta.label}</span></button>)}</div></div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TRWSiteEditor));
</script>
</body>
</html>
