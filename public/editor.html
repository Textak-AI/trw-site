<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═════════════════════════════════════════════
   THE RAIL WAY™ — Site Editor v2
   Source of truth: /data/content.json
   Publishes via /api/publish → commits to GitHub → Vercel rebuilds.
   Designed for Ella: simple forms, no structural editing.
   ───────────────────────────────────────────── */

const CDN = "https://cdn.jsdelivr.net/gh/Textak-AI/trw-assets@main/";
const LOGO_WHITE = CDN + "brand/rail-way-logo-white.png";
const LOGO_BLACK = CDN + "brand/rail-way-logo.png";

  danger: "#CC4444", success: "#2D8F5E"
};
const F = { h: "Georgia,serif", b: "'Segoe UI',Arial,sans-serif" };

const labelFor = (type, key) => {
  if (type === "page") return LABELS.pages[key] || key;
  if (type === "section") return LABELS.sections[key] || toTitle(key);
  return LABELS.fields[key] || toTitle(key);
};

const toTitle = (s) => s.replace(/([A-Z])/g, " $1").replace(/^./, (c) => c.toUpperCase()).trim();

// Fields that should never appear in the editor for any role (purely structural)
const HIDDEN_FIELDS = new Set(["imgKey", "type"]);

// Fields only admins can see/edit
const isAdminOnly = (key) => key.startsWith("_adminOnly_");

// Long-form fields that should get textareas instead of text inputs
const isLongText = (key, value) => {
  if (typeof value !== "string") return false;
  if (value.length > 100) return true;
  if (["body", "body1", "body2", "p1", "p2", "p3", "intro", "description",
       "quote", "desc", "tributeItalic", "d", "a", "sub", "subtext",
       "disclaimer", "bio"].includes(key)) return true;
  return false;
};

// ═══ AUTH & API ═══
const API = {
  async login(email, password) {
    const res = await fetch("/api/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    return res.json();
  },
  async logout() {
    await fetch("/api/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "logout" })
    });
  },
  async checkAuth() {
    const res = await fetch("/api/auth");
    return res.json();
  },
  async publish(content, message) {
    const res = await fetch("/api/publish", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "content", data: content, message })
    });
    return res.json();
  },
  async loadContent() {
    // Cache-bust so we always get the freshest JSON after a publish
    const res = await fetch("/data/content.json?t=" + Date.now());
    if (!res.ok) throw new Error("Failed to load content");
    return res.json();
  }
};

// ═══ LOGIN SCREEN ═══
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e?.preventDefault();
    setLoading(true);
    setError("");
    try {
      const res = await API.login(email, password);
      if (res.error) setError(res.error);
      else onLogin(res);
    } catch (err) {
      setError("Connection problem. Try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, background: C.deep,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: F.b
    }}>
      <form onSubmit={handleSubmit} style={{
        width: 360, padding: 40, background: "rgba(255,255,255,0.03)",
        borderRadius: 12, border: "1px solid rgba(255,255,255,0.08)"
      }}>
        <img src={LOGO_WHITE} alt="TRW" style={{ height: 32, marginBottom: 20, filter: "brightness(10)" }} />
        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 28 }}>
          Site Editor
        </div>

        <label style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", display: "block", marginBottom: 6 }}>Email</label>
        <input
          type="email"
          value={email}
          onChange={(e) => setEmail(e.target.value)}
          style={{ width: "100%", padding: "10px 12px", background: "#2C2C2C", border: "1px solid #444", borderRadius: 6, color: "#fff", fontSize: 14, marginBottom: 16 }}
          required
        />

        <label style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", display: "block", marginBottom: 6 }}>Password</label>
        <input
          type="password"
          value={password}
          onChange={(e) => setPassword(e.target.value)}
          style={{ width: "100%", padding: "10px 12px", background: "#2C2C2C", border: "1px solid #444", borderRadius: 6, color: "#fff", fontSize: 14, marginBottom: 20 }}
          required
        />

        {error && <div style={{ color: C.rustSoft, fontSize: 12, marginBottom: 12 }}>{error}</div>}

        <button
          type="submit"
          disabled={loading}
          style={{
            width: "100%", padding: "11px 0", background: C.rust, color: "#fff",
            border: "none", borderRadius: 6, fontSize: 14, fontWeight: 600,
            cursor: loading ? "wait" : "pointer", opacity: loading ? 0.6 : 1
          }}
        >
          {loading ? "Signing in..." : "Sign In"}
        </button>
      </form>
    </div>
  );
}

// ═══ PRIMITIVE FIELD COMPONENTS ═══

function TextField({ label, value, onChange, multiline, required, hint }) {
  const Tag = multiline ? "textarea" : "input";
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 11, color: C.gray, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6, fontWeight: 600 }}>
        {label}
        {required && <span style={{ color: C.danger, marginLeft: 4 }}>*</span>}
      </label>
      <Tag
        value={value ?? ""}
        onChange={(e) => onChange(e.target.value)}
        rows={multiline ? Math.max(3, Math.min(8, Math.ceil((value?.length || 0) / 70))) : undefined}
        style={{
          width: "100%",
          padding: "10px 12px",
          border: "1px solid " + C.rule,
          borderRadius: 6,
          fontSize: 14,
          color: C.black,
          background: C.white,
          fontFamily: multiline ? F.b : F.b,
          lineHeight: multiline ? 1.5 : 1.3
        }}
      />
      {hint && <div style={{ fontSize: 11, color: C.grayLt, marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

function SelectField({ label, value, onChange, options }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: "block", fontSize: 11, color: C.gray, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 6, fontWeight: 600 }}>
        {label}
      </label>
      <select
        value={value ?? ""}
        onChange={(e) => onChange(e.target.value)}
        style={{
          width: "100%",
          padding: "10px 12px",
          border: "1px solid " + C.rule,
          borderRadius: 6,
          fontSize: 14,
          color: C.black,
          background: C.white,
          fontFamily: F.b,
          cursor: "pointer"
        }}
      >
        <option value="">Select category…</option>
        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
      </select>
    </div>
  );
}

// Fixed category options for Legacy Entries — keep consistent across all entries
const CATEGORY_OPTIONS = ["In Memoriam", "Leadership Change", "Hall of Fame", "Retirement", "Promotion", "Industry News"];

// Renders any value recursively: scalars → inputs, objects → nested fieldset, arrays → repeatable
function FieldRenderer({ keyName, value, path, onChange, userRole, depth = 0 }) {
  if (HIDDEN_FIELDS.has(keyName)) return null;
  if (isAdminOnly(keyName) && userRole !== "admin") return null;

  // Array of items
  if (Array.isArray(value)) {
    return <ArrayField keyName={keyName} items={value} path={path} onChange={onChange} userRole={userRole} depth={depth} />;
  }

  // Nested object
  if (value !== null && typeof value === "object") {
    return <ObjectField keyName={keyName} obj={value} path={path} onChange={onChange} userRole={userRole} depth={depth} />;
  }

  // Scalar (string/number/boolean)
  const label = labelFor("field", keyName);

  // Category fields → fixed dropdown for consistency across entries
  if (keyName === "category" || keyName === "c") {
    return (
      <SelectField
        label={label}
        value={value}
        onChange={(v) => onChange(path, v)}
        options={CATEGORY_OPTIONS}
      />
    );
  }

  const multiline = isLongText(keyName, value);

  return (
    <TextField
      label={label + (isAdminOnly(keyName) ? " 🔒" : "")}
      value={value}
      onChange={(v) => onChange(path, v)}
      multiline={multiline}
    />
  );
}

function ObjectField({ keyName, obj, path, onChange, userRole, depth }) {
  const [expanded, setExpanded] = useState(depth < 1);
  const displayLabel = labelFor(depth === 0 ? "section" : "field", keyName);
  const childKeys = Object.keys(obj).filter(k => {
    if (HIDDEN_FIELDS.has(k)) return false;
    if (isAdminOnly(k) && userRole !== "admin") return false;
    return true;
  });

  if (childKeys.length === 0) return null;

  return (
    <div style={{
      background: depth === 0 ? C.white : "transparent",
      border: depth === 0 ? "1px solid " + C.rule : "none",
      borderRadius: depth === 0 ? 8 : 0,
      marginBottom: depth === 0 ? 16 : 12,
      padding: depth === 0 ? 0 : "0 0 0 12px",
      borderLeft: depth > 0 ? "2px solid " + C.rule : undefined
    }}>
      {depth === 0 ? (
        <button
          type="button"
          onClick={() => setExpanded(!expanded)}
          style={{
            width: "100%", textAlign: "left", padding: "14px 20px",
            background: expanded ? C.cream : C.white, border: "none",
            borderBottom: expanded ? "1px solid " + C.rule : "none",
            borderRadius: expanded ? "8px 8px 0 0" : 8,
            cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center"
          }}
        >
          <span style={{ fontFamily: F.h, fontSize: 15, fontWeight: 700, color: C.black }}>
            {displayLabel}
          </span>
          <span style={{ fontSize: 14, color: C.grayLt }}>{expanded ? "▾" : "▸"}</span>
        </button>
      ) : (
        <div style={{ fontSize: 11, color: C.gray, textTransform: "uppercase", letterSpacing: 0.6, fontWeight: 600, marginBottom: 10, marginTop: 4 }}>
          {displayLabel}{isAdminOnly(keyName) ? " 🔒" : ""}
        </div>
      )}

      {expanded && (
        <div style={{ padding: depth === 0 ? "16px 20px 4px" : 0 }}>
          {childKeys.map(k => (
            <FieldRenderer
              key={k}
              keyName={k}
              value={obj[k]}
              path={[...path, k]}
              onChange={onChange}
              userRole={userRole}
              depth={depth + 1}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function ArrayField({ keyName, items, path, onChange, userRole, depth }) {
  const [openIdx, setOpenIdx] = useState(0);
  const label = labelFor(depth === 0 ? "section" : "field", keyName);

  // Heuristic for "title" of each item in the array
  const itemTitle = (item, i) => {
    if (typeof item === "string") return `Item ${i + 1}: ${item.substring(0, 40)}`;
    if (item?.name) return item.name;
    if (item?.heading) return item.heading;
    if (item?.title) return item.title;
    if (item?.t) return item.t;
    if (item?.q) return item.q.substring(0, 60);
    if (item?.n) return `${item.n} — ${item.t || ''}`;
    if (item?.v) return `${item.v} ${item.l ? '— ' + item.l.substring(0, 40) : ''}`;
    if (item?.award) return item.award;
    if (item?.dateLabel) return `${item.dateLabel} — ${item.heading || ''}`;
    if (item?.dateBadgeMonth) return `${item.dateBadgeDay} ${item.dateBadgeMonth} — ${item.heading || ''}`;
    if (item?.r) return item.r;
    return `Item ${i + 1}`;
  };

  const setItem = (idx, updated) => {
    const newArr = [...items];
    newArr[idx] = updated;
    onChange(path, newArr);
  };

  const addItem = () => {
    if (items.length === 0) {
      onChange(path, [""]);
      return;
    }
    const template = typeof items[0] === "string"
      ? ""
      : Object.fromEntries(Object.keys(items[0]).map(k => [k, ""]));
    onChange(path, [template, ...items]);
    setOpenIdx(0);
  };

  const removeItem = (idx) => {
    if (!confirm("Remove this item? This cannot be undone until you publish again.")) return;
    const newArr = items.filter((_, i) => i !== idx);
    onChange(path, newArr);
    if (openIdx >= newArr.length) setOpenIdx(Math.max(0, newArr.length - 1));
  };

  const moveItem = (idx, direction) => {
    const newArr = [...items];
    const swap = idx + direction;
    if (swap < 0 || swap >= newArr.length) return;
    [newArr[idx], newArr[swap]] = [newArr[swap], newArr[idx]];
    onChange(path, newArr);
    setOpenIdx(swap);
  };

  return (
    <div style={{
      background: depth === 0 ? C.white : "transparent",
      border: depth === 0 ? "1px solid " + C.rule : "none",
      borderRadius: depth === 0 ? 8 : 0,
      marginBottom: depth === 0 ? 16 : 12,
      padding: depth === 0 ? 0 : "0 0 0 12px",
      borderLeft: depth > 0 ? "2px solid " + C.rule : undefined
    }}>
      {depth === 0 ? (
        <div style={{
          padding: "14px 20px",
          background: C.cream, borderBottom: "1px solid " + C.rule,
          borderRadius: "8px 8px 0 0",
          display: "flex", justifyContent: "space-between", alignItems: "center"
        }}>
          <span style={{ fontFamily: F.h, fontSize: 15, fontWeight: 700, color: C.black }}>
            {label} <span style={{ color: C.grayLt, fontWeight: 400, fontSize: 13 }}>({items.length})</span>
          </span>
        </div>
      ) : (
        <div style={{ fontSize: 11, color: C.gray, textTransform: "uppercase", letterSpacing: 0.6, fontWeight: 600, marginBottom: 10, marginTop: 4 }}>
          {label} <span style={{ fontWeight: 400, color: C.grayLt, textTransform: "none", letterSpacing: 0 }}>({items.length})</span>
        </div>
      )}

      <div style={{ padding: depth === 0 ? "12px 20px 16px" : 0 }}>
        {items.map((item, idx) => (
          <div key={idx} style={{ border: "1px solid " + C.rule, borderRadius: 6, marginBottom: 8, background: C.white }}>
            <button
              type="button"
              onClick={() => setOpenIdx(openIdx === idx ? -1 : idx)}
              style={{
                width: "100%", textAlign: "left", padding: "10px 12px",
                background: openIdx === idx ? C.cream : C.white, border: "none",
                borderBottom: openIdx === idx ? "1px solid " + C.rule : "none",
                display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer",
                borderRadius: openIdx === idx ? "6px 6px 0 0" : 6
              }}
            >
              <span style={{ fontSize: 13, fontWeight: 600, color: C.black, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", paddingRight: 8 }}>
                {itemTitle(item, idx)}
              </span>
              <span style={{ fontSize: 12, color: C.grayLt }}>{openIdx === idx ? "▾" : "▸"}</span>
            </button>

            {openIdx === idx && (
              <div style={{ padding: 12 }}>
                {typeof item === "string" ? (
                  <TextField
                    label="Value"
                    value={item}
                    onChange={(v) => setItem(idx, v)}
                    multiline={item.length > 60}
                  />
                ) : (
                  Object.keys(item).filter(k => !HIDDEN_FIELDS.has(k) && (!isAdminOnly(k) || userRole === "admin")).map(k => (
                    <FieldRenderer
                      key={k}
                      keyName={k}
                      value={item[k]}
                      path={[...path, idx, k]}
                      onChange={onChange}
                      userRole={userRole}
                      depth={depth + 2}
                    />
                  ))
                )}

                <div style={{ display: "flex", gap: 8, paddingTop: 8, borderTop: "1px solid " + C.rule, marginTop: 10 }}>
                  <button type="button" onClick={() => moveItem(idx, -1)} disabled={idx === 0} style={sbtn(idx !== 0)}>↑ Up</button>
                  <button type="button" onClick={() => moveItem(idx, 1)} disabled={idx === items.length - 1} style={sbtn(idx !== items.length - 1)}>↓ Down</button>
                  <button type="button" onClick={() => removeItem(idx)} style={{ ...sbtn(true), color: C.danger, marginLeft: "auto" }}>Remove</button>
                </div>
              </div>
            )}
          </div>
        ))}

        <button
          type="button"
          onClick={addItem}
          style={{
            width: "100%", padding: "8px 0", background: "transparent", border: "1px dashed " + C.rule,
            borderRadius: 6, color: C.gray, fontSize: 12, cursor: "pointer", fontWeight: 600
          }}
        >
          + Add another {labelFor("field", keyName).replace(/ies$/, "y").replace(/s$/, "").toLowerCase()}
        </button>
      </div>
    </div>
  );
}

const sbtn = (enabled) => ({
  padding: "6px 10px", background: "transparent", border: "1px solid " + C.rule,
  borderRadius: 4, fontSize: 11, color: enabled ? C.gray : C.grayLt,
  cursor: enabled ? "pointer" : "not-allowed", fontWeight: 600, opacity: enabled ? 1 : 0.5
});

// ═══ MAIN EDITOR ═══
function TRWEditorV2() {
  const [user, setUser] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [content, setContent] = useState(null);
  const [originalContent, setOriginalContent] = useState(null);
  const [loadError, setLoadError] = useState("");
  const [activePage, setActivePage] = useState("home");
  const [publishState, setPublishState] = useState(""); // "" | "saving" | "saved" | "error"
  const [publishError, setPublishError] = useState("");

  // Check auth on mount
  useEffect(() => {
    API.checkAuth().then(res => {
      if (res.authenticated) setUser(res);
    }).catch(() => {}).finally(() => setAuthChecked(true));
  }, []);

  // Load content after auth
  useEffect(() => {
    if (!user) return;
    API.loadContent().then(c => {
      setContent(c);
      setOriginalContent(JSON.parse(JSON.stringify(c))); // deep clone
    }).catch(err => setLoadError("Could not load site content. Try refreshing."));
  }, [user]);

  // Dirty-check: any diff between content and originalContent?
  const isDirty = useMemo(() => {
    if (!content || !originalContent) return false;
    return JSON.stringify(content) !== JSON.stringify(originalContent);
  }, [content, originalContent]);

  // Warn on nav away if unsaved
  useEffect(() => {
    const handler = (e) => {
      if (isDirty) { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [isDirty]);

  // Update a value by path (e.g., ["home", "hero", "headline"])
  const updatePath = useCallback((path, newValue) => {
    setContent(prev => {
      if (!prev) return prev;
      const next = JSON.parse(JSON.stringify(prev));
      let node = next;
      for (let i = 0; i < path.length - 1; i++) node = node[path[i]];
      node[path[path.length - 1]] = newValue;
      return next;
    });
  }, []);

  const handlePublish = async () => {
    if (!isDirty) return;
    setPublishState("saving");
    setPublishError("");
    try {
      const msg = "Content update by " + (user?.name || user?.email || "editor") + " at " + new Date().toISOString();
      const res = await API.publish(content, msg);
      if (res.ok) {
        setPublishState("saved");
        setOriginalContent(JSON.parse(JSON.stringify(content)));
        setTimeout(() => setPublishState(""), 3500);
      } else {
        setPublishState("error");
        setPublishError(res.error || "Publish failed");
      }
    } catch (err) {
      setPublishState("error");
      setPublishError(err.message || "Network error");
    }
  };

  const handleDiscard = () => {
    if (!confirm("Discard all unsaved changes?")) return;
    setContent(JSON.parse(JSON.stringify(originalContent)));
  };

  const handleLogout = async () => {
    if (isDirty && !confirm("You have unsaved changes. Sign out anyway?")) return;
    await API.logout();
    setUser(null);
    setContent(null);
    setOriginalContent(null);
  };

  // Loading states
  if (!authChecked) {
    return <div style={fullscreenMsg}>Loading editor...</div>;
  }
  if (!user) {
    return <LoginScreen onLogin={setUser} />;
  }
  if (loadError) {
    return <div style={fullscreenMsg}>{loadError}</div>;
  }
  if (!content) {
    return <div style={fullscreenMsg}>Loading site content...</div>;
  }

  // Main layout
  const pageKeys = Object.keys(content).filter(k => k !== "_meta");
  const pageData = content[activePage];
  const sectionKeys = Object.keys(pageData || {});

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: F.b, background: C.bg }}>

      {/* LEFT SIDEBAR — PAGE PICKER */}
      <aside style={{ width: 220, background: C.deep, color: C.white, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "16px 18px 12px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
          <img src={LOGO_WHITE} alt="TRW" style={{ height: 28, filter: "brightness(10)" }} />
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", letterSpacing: 1.5, textTransform: "uppercase", marginTop: 8 }}>
            Site Editor
          </div>
          <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>
              {user.name || user.email}{" "}
              <span style={{ color: user.role === "admin" ? C.rust : "rgba(255,255,255,0.4)", fontSize: 9, textTransform: "uppercase", fontWeight: 600 }}>{user.role}</span>
            </span>
            <button onClick={handleLogout} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.4)", fontSize: 9, cursor: "pointer", textDecoration: "underline" }}>
              Sign out
            </button>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }} className="scrollbar-thin">
          <div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase", padding: "12px 18px 8px" }}>Pages</div>
          {pageKeys.map(k => (
            <button
              key={k}
              onClick={() => setActivePage(k)}
              style={{
                display: "block", width: "100%", textAlign: "left",
                padding: "10px 18px", background: activePage === k ? "rgba(196,98,45,0.2)" : "transparent",
                border: "none", borderLeft: activePage === k ? "3px solid " + C.rust : "3px solid transparent",
                color: activePage === k ? C.rust : "rgba(255,255,255,0.75)",
                fontSize: 13, cursor: "pointer", fontWeight: activePage === k ? 600 : 400
              }}
            >
              {labelFor("page", k)}
            </button>
          ))}
        </div>

        <div style={{ padding: "12px 18px", borderTop: "1px solid rgba(255,255,255,0.08)", fontSize: 10, color: "rgba(255,255,255,0.35)", lineHeight: 1.6 }}>
          <a href="/" target="_blank" rel="noopener" style={{ color: "rgba(255,255,255,0.5)", textDecoration: "none" }}>View Live Site ↗</a>
        </div>
      </aside>

      {/* MAIN CONTENT AREA */}
      <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

        {/* TOP BAR */}
        <header style={{
          padding: "16px 28px", background: C.white, borderBottom: "1px solid " + C.rule,
          display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0
        }}>
          <div>
            <h1 style={{ fontFamily: F.h, fontSize: 22, fontWeight: 700, color: C.black, margin: 0 }}>
              {labelFor("page", activePage)}
            </h1>
            <p style={{ fontSize: 12, color: C.grayLt, margin: "2px 0 0" }}>
              {sectionKeys.length} section{sectionKeys.length !== 1 ? "s" : ""}
              {isDirty && <span style={{ color: C.rust, marginLeft: 10, fontWeight: 600 }}>• Unsaved changes</span>}
            </p>
          </div>

          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {publishState === "saving" && <span style={{ fontSize: 12, color: C.gray }}>Publishing...</span>}
            {publishState === "saved" && <span style={{ fontSize: 12, color: C.success, fontWeight: 600 }}>✓ Published — changes live in ~1–2 min</span>}
            {publishState === "error" && <span style={{ fontSize: 12, color: C.danger }}>Error: {publishError}</span>}

            {isDirty && (
              <button onClick={handleDiscard} style={{
                padding: "9px 14px", background: C.white, color: C.gray,
                border: "1px solid " + C.rule, borderRadius: 6, fontSize: 13,
                fontWeight: 600, cursor: "pointer"
              }}>
                Discard
              </button>
            )}

            <button
              onClick={handlePublish}
              disabled={!isDirty || publishState === "saving"}
              style={{
                padding: "9px 18px",
                background: isDirty ? C.rust : C.rule,
                color: isDirty ? "#fff" : C.grayLt,
                border: "none", borderRadius: 6, fontSize: 13,
                fontWeight: 600, cursor: isDirty ? "pointer" : "not-allowed"
              }}
            >
              {publishState === "saving" ? "Publishing..." : "Publish Changes"}
            </button>
          </div>
        </header>

        {/* FORM AREA */}
        <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }} className="scrollbar-thin">
          <div style={{ maxWidth: 820, margin: "0 auto" }}>

            {pageData && sectionKeys.map(sectionKey => (
              <FieldRenderer
                key={sectionKey}
                keyName={sectionKey}
                value={pageData[sectionKey]}
                path={[activePage, sectionKey]}
                onChange={updatePath}
                userRole={user.role}
                depth={0}
              />
            ))}

            <div style={{ padding: 20, marginTop: 20, background: C.cream, borderRadius: 8, fontSize: 12, color: C.gray, lineHeight: 1.6 }}>
              <strong>Tip:</strong> Click sections above to expand. Edit text, then click <strong>Publish Changes</strong> at the top. Your edits go live in about 1–2 minutes.
              {user.role === "admin" && (
                <div style={{ marginTop: 8, fontSize: 11, color: C.grayLt }}>
                  Fields marked with 🔒 are admin-only and not visible to editor-role users.
                </div>
              )}
            </div>
          </div>
        </div>

      </main>
    </div>
  );
}

const fullscreenMsg = {
  position: "fixed", inset: 0, background: C.deep, color: "rgba(255,255,255,0.5)",
  display: "flex", alignItems: "center", justifyContent: "center",
  fontFamily: F.b, fontSize: 14
};

// ═══ MOUNT ═══
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TRWEditorV2 />);
</script>
</body>
</html>
